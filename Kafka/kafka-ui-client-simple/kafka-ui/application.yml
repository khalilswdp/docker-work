kafka:
  clusters:
    - name: secured-cluster
      bootstrapServers: ${KAFKA_BOOTSTRAP_SERVERS}

      # This is Kafka UI's own SSL config for HTTP services like Schema Registry.
      # It is important for HTTPS Schema Registry.
      ssl:
        truststore-location: /certs/kafka.truststore.jks
        truststore-password: ${KAFKA_TRUSTSTORE_PASSWORD}
        verify-ssl: true

      properties:
        security.protocol: SASL_SSL
        sasl.mechanism: PLAIN
        sasl.jaas.config: >
          org.apache.kafka.common.security.plain.PlainLoginModule required
          username="${KAFKA_USERNAME}"
          password="${KAFKA_PASSWORD}";

        ssl.protocol: TLS
        ssl.enabled.protocols: TLSv1.2,TLSv1.3
        ssl.truststore.location: /certs/kafka.truststore.jks
        ssl.truststore.password: ${KAFKA_TRUSTSTORE_PASSWORD}
        ssl.truststore.type: JKS

        ssl.keystore.location: /certs/kafka.keystore.jks
        ssl.keystore.password: ${KAFKA_KEYSTORE_PASSWORD}
        ssl.keystore.type: JKS
        ssl.key.password: ${KAFKA_KEY_PASSWORD}

      schemaRegistry: ${SCHEMA_REGISTRY_URL}

      schemaRegistryAuth:
        username: ${SCHEMA_REGISTRY_USERNAME}
        password: ${SCHEMA_REGISTRY_PASSWORD}

      defaultKeySerde: String
      defaultValueSerde: SchemaRegistry