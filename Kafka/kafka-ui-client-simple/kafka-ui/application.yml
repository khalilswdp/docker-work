kafka:
  clusters:
    - name: secure-cluster
      bootstrapServers: ${KAFKA_BOOTSTRAP_SERVERS}
      properties:
        security.protocol: SASL_SSL
        sasl.mechanism: PLAIN
        sasl.jaas.config: org.apache.kafka.common.security.plain.PlainLoginModule required username="${KAFKA_USERNAME}" password="${KAFKA_PASSWORD}";
        ssl.protocol: TLSv1.2
        ssl.enabled.protocols: TLSv1.2,TLSv1.3
        ssl.truststore.location: /certs/kafka.truststore.jks
        ssl.truststore.password: ${KAFKA_TRUSTSTORE_PASSWORD}
        ssl.keystore.location: /certs/kafka.keystore.jks
        ssl.keystore.password: ${KAFKA_KEYSTORE_PASSWORD}
        ssl.key.password: ${KAFKA_KEY_PASSWORD}
        # Prefer proper SANs in certs. Uncomment only for local/self-signed certs with hostname mismatch.
        # ssl.endpoint.identification.algorithm: ""
      schemaRegistry: ${SCHEMA_REGISTRY_URL}
      schemaRegistryAuth:
        username: ${SCHEMA_REGISTRY_USERNAME}
        password: ${SCHEMA_REGISTRY_PASSWORD}
      serde:
        - name: Avro
          className: com.provectus.kafka.ui.serdes.builtin.AvroSerde
          properties:
            schema.registry.url: ${SCHEMA_REGISTRY_URL}
            basic.auth.credentials.source: USER_INFO
            basic.auth.user.info: ${SCHEMA_REGISTRY_USERNAME}:${SCHEMA_REGISTRY_PASSWORD}
