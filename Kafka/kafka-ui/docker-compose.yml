name: kafka-secure-local

networks:
  kafka-net:
    name: kafka-net

volumes:
  broker1-data:
  broker2-data:
  broker3-data:

x-kafka-common: &kafka-common
  image: confluentinc/cp-kafka:7.7.0
  restart: unless-stopped
  networks:
    - kafka-net
  volumes:
    - ./secrets:/etc/kafka/secrets:ro
  mem_limit: 1g
  environment: &kafka-common-env
    CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk

    KAFKA_PROCESS_ROLES: broker,controller
    KAFKA_CONTROLLER_QUORUM_VOTERS: 1@broker1:19092,2@broker2:19092,3@broker3:19092
    KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER

    KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,INTERNAL:SASL_SSL,EXTERNAL:SASL_SSL
    KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL

    KAFKA_SASL_ENABLED_MECHANISMS: PLAIN
    KAFKA_SASL_MECHANISM_INTER_BROKER_PROTOCOL: PLAIN

    # Required by Confluent's Docker image when SASL is enabled.
    KAFKA_OPTS: -Djava.security.auth.login.config=/etc/kafka/secrets/kafka_server_jaas.conf

    KAFKA_SSL_TRUSTSTORE_FILENAME: kafka.truststore.jks
    KAFKA_SSL_TRUSTSTORE_CREDENTIALS: truststore_creds
    KAFKA_SSL_CLIENT_AUTH: required

    KAFKA_LISTENER_NAME_INTERNAL_PLAIN_SASL_JAAS_CONFIG: >
      org.apache.kafka.common.security.plain.PlainLoginModule required
      username="broker"
      password="broker-secret"
      user_token="local-token"
      user_broker="broker-secret";

    KAFKA_LISTENER_NAME_EXTERNAL_PLAIN_SASL_JAAS_CONFIG: >
      org.apache.kafka.common.security.plain.PlainLoginModule required
      username="broker"
      password="broker-secret"
      user_token="local-token"
      user_broker="broker-secret";

    KAFKA_LOG_DIRS: /var/lib/kafka/data
    KAFKA_DEFAULT_REPLICATION_FACTOR: 3
    KAFKA_NUM_PARTITIONS: 3
    KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 3
    KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 3
    KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 2
    KAFKA_MIN_INSYNC_REPLICAS: 2
    KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
    KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
    KAFKA_HEAP_OPTS: "-Xms512m -Xmx512m"

  healthcheck:
    test:
      [
        "CMD-SHELL",
        "kafka-broker-api-versions --bootstrap-server localhost:19093 --command-config /etc/kafka/secrets/client.properties >/dev/null 2>&1"
      ]
    interval: 10s
    timeout: 10s
    retries: 20
    start_period: 40s

services:
  broker1:
    <<: *kafka-common
    container_name: broker1
    hostname: broker1
    ports:
      - "19093:29093"
    volumes:
      - ./secrets:/etc/kafka/secrets:ro
      - broker1-data:/var/lib/kafka/data
    environment:
      <<: *kafka-common-env
      KAFKA_NODE_ID: 1
      KAFKA_BROKER_RACK: local-rack-1
      KAFKA_LISTENERS: CONTROLLER://0.0.0.0:19092,INTERNAL://0.0.0.0:19093,EXTERNAL://0.0.0.0:29093
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://broker1:19093,EXTERNAL://localhost:19093
      KAFKA_SSL_KEYSTORE_FILENAME: broker01.keystore.jks
      KAFKA_SSL_KEYSTORE_CREDENTIALS: broker_keystore_creds
      KAFKA_SSL_KEY_CREDENTIALS: broker_key_creds

  broker2:
    <<: *kafka-common
    container_name: broker2
    hostname: broker2
    ports:
      - "29093:29093"
    volumes:
      - ./secrets:/etc/kafka/secrets:ro
      - broker2-data:/var/lib/kafka/data
    environment:
      <<: *kafka-common-env
      KAFKA_NODE_ID: 2
      KAFKA_BROKER_RACK: local-rack-2
      KAFKA_LISTENERS: CONTROLLER://0.0.0.0:19092,INTERNAL://0.0.0.0:19093,EXTERNAL://0.0.0.0:29093
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://broker2:19093,EXTERNAL://localhost:29093
      KAFKA_SSL_KEYSTORE_FILENAME: broker02.keystore.jks
      KAFKA_SSL_KEYSTORE_CREDENTIALS: broker_keystore_creds
      KAFKA_SSL_KEY_CREDENTIALS: broker_key_creds

  broker3:
    <<: *kafka-common
    container_name: broker3
    hostname: broker3
    ports:
      - "39093:29093"
    volumes:
      - ./secrets:/etc/kafka/secrets:ro
      - broker3-data:/var/lib/kafka/data
    environment:
      <<: *kafka-common-env
      KAFKA_NODE_ID: 3
      KAFKA_BROKER_RACK: local-rack-3
      KAFKA_LISTENERS: CONTROLLER://0.0.0.0:19092,INTERNAL://0.0.0.0:19093,EXTERNAL://0.0.0.0:29093
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://broker3:19093,EXTERNAL://localhost:39093
      KAFKA_SSL_KEYSTORE_FILENAME: broker03.keystore.jks
      KAFKA_SSL_KEYSTORE_CREDENTIALS: broker_keystore_creds
      KAFKA_SSL_KEY_CREDENTIALS: broker_key_creds

  schema-registry:
    image: confluentinc/cp-schema-registry:7.7.0
    container_name: schema-registry
    hostname: schema-registry
    restart: unless-stopped
    networks:
      - kafka-net
    depends_on:
      broker1:
        condition: service_healthy
      broker2:
        condition: service_healthy
      broker3:
        condition: service_healthy
    ports:
      - "8085:8085"
    volumes:
      - ./certs:/certs:ro
      - ./schema-registry-users.properties:/etc/schema-registry/schema-registry-users.properties:ro
      - ./schema-registry.jaas.conf:/etc/schema-registry/jaas.conf:ro
    mem_limit: 512m
    environment:
      SCHEMA_REGISTRY_HOST_NAME: schema-registry
      SCHEMA_REGISTRY_LISTENERS: https://0.0.0.0:8085
      SCHEMA_REGISTRY_INTER_INSTANCE_PROTOCOL: https
      SCHEMA_REGISTRY_HEAP_OPTS: "-Xms256m -Xmx256m"

      SCHEMA_REGISTRY_KAFKASTORE_TOPIC: _schemas
      SCHEMA_REGISTRY_KAFKASTORE_TOPIC_REPLICATION_FACTOR: 3
      SCHEMA_REGISTRY_KAFKASTORE_INIT_TIMEOUT_MS: 120000

      SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS: broker1:19093,broker2:19093,broker3:19093
      SCHEMA_REGISTRY_KAFKASTORE_SECURITY_PROTOCOL: SASL_SSL
      SCHEMA_REGISTRY_KAFKASTORE_SASL_MECHANISM: PLAIN
      SCHEMA_REGISTRY_KAFKASTORE_SASL_JAAS_CONFIG: >
        org.apache.kafka.common.security.plain.PlainLoginModule required
        username="token"
        password="local-token";

      SCHEMA_REGISTRY_KAFKASTORE_SSL_TRUSTSTORE_LOCATION: /certs/kafka.truststore.jks
      SCHEMA_REGISTRY_KAFKASTORE_SSL_TRUSTSTORE_PASSWORD: truststore-password
      SCHEMA_REGISTRY_KAFKASTORE_SSL_TRUSTSTORE_TYPE: JKS
      SCHEMA_REGISTRY_KAFKASTORE_SSL_KEYSTORE_LOCATION: /certs/schema-registry.keystore.jks
      SCHEMA_REGISTRY_KAFKASTORE_SSL_KEYSTORE_PASSWORD: changeit
      SCHEMA_REGISTRY_KAFKASTORE_SSL_KEYSTORE_TYPE: JKS
      SCHEMA_REGISTRY_KAFKASTORE_SSL_KEY_PASSWORD: changeit

      SCHEMA_REGISTRY_SSL_KEYSTORE_LOCATION: /certs/schema-registry.keystore.jks
      SCHEMA_REGISTRY_SSL_KEYSTORE_PASSWORD: changeit
      SCHEMA_REGISTRY_SSL_KEYSTORE_TYPE: JKS
      SCHEMA_REGISTRY_SSL_KEY_PASSWORD: changeit
      SCHEMA_REGISTRY_SSL_TRUSTSTORE_LOCATION: /certs/kafka.truststore.jks
      SCHEMA_REGISTRY_SSL_TRUSTSTORE_PASSWORD: truststore-password
      SCHEMA_REGISTRY_SSL_TRUSTSTORE_TYPE: JKS

      SCHEMA_REGISTRY_AUTHENTICATION_METHOD: BASIC
      SCHEMA_REGISTRY_AUTHENTICATION_REALM: SchemaRegistry-Props
      SCHEMA_REGISTRY_AUTHENTICATION_ROLES: sr-user,sr-admin
      SCHEMA_REGISTRY_OPTS: -Djava.security.auth.login.config=/etc/schema-registry/jaas.conf

    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -k -f https://localhost:8085/subjects >/dev/null 2>&1"
        ]
      interval: 10s
      timeout: 10s
      retries: 20
      start_period: 30s

  kafka-ui:
    image: provectuslabs/kafka-ui:v0.7.2
    container_name: kafka-ui
    hostname: kafka-ui
    restart: unless-stopped
    networks:
      - kafka-net
    depends_on:
      schema-registry:
        condition: service_healthy
    ports:
      - "8080:8080"
    volumes:
      - ./kafka-ui/application.yml:/etc/kafkaui/application.yml:ro
      - ./certs:/certs:ro
    mem_limit: 512m
    environment:
      SPRING_CONFIG_ADDITIONAL_LOCATION: /etc/kafkaui/application.yml

  topic-init:
    image: confluentinc/cp-kafka:7.7.0
    container_name: topic-init
    networks:
      - kafka-net
    depends_on:
      broker1:
        condition: service_healthy
      broker2:
        condition: service_healthy
      broker3:
        condition: service_healthy
    volumes:
      - ./secrets:/etc/kafka/secrets:ro
    command: >
      bash -c "
        kafka-topics
        --bootstrap-server broker1:19093
        --command-config /etc/kafka/secrets/client.properties
        --create
        --if-not-exists
        --topic test.events
        --partitions 3
        --replication-factor 3
      "
    profiles: ["init"]
